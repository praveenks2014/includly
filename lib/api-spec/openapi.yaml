openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SenseiLink API specification — marketplace for parents to find Shadow Teachers, Special Educators, and Medical Specialists
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile management
  - name: professionals
    description: Professional profile operations
  - name: search
    description: Search and discovery
  - name: ratings
    description: Rating system
  - name: unlocks
    description: Contact unlock operations
  - name: dashboard
    description: Dashboard summaries
  - name: compliance
    description: Compliance and legal content
  - name: payments
    description: Payment processing (Stripe + Razorpay)
  - name: webhooks
    description: Payment webhook handlers
  - name: admin
    description: Admin-only platform management
  - name: notifications
    description: Push notification subscription and preferences
  - name: storage
    description: Object storage upload and serving endpoints
  - name: verifications
    description: Identity verification and certification uploads
  - name: account
    description: Account management including data deletion
  - name: sessions
    description: Session scheduling, availability management, and session booking payments

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/role:
    patch:
      operationId: setMyRole
      tags: [users]
      summary: Set current user role (parent or professional)
      description: Allows a user to self-select their role during onboarding
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoleBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /professionals/me:
    get:
      operationId: getMyProfessionalProfile
      tags: [professionals]
      summary: Get my professional profile
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Professional profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createProfessionalProfile
      tags: [professionals]
      summary: Create professional profile (onboarding)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfessionalProfileBody"
      responses:
        "201":
          description: Created professional profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalProfile"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProfessionalProfile
      tags: [professionals]
      summary: Update professional profile
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfessionalProfileBody"
      responses:
        "200":
          description: Updated professional profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalProfile"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /professionals/me/upi-verification/order:
    post:
      operationId: createUpiVerificationOrder
      tags: [professionals]
      summary: Create a ₹1 Razorpay order (UPI-only) to verify the professional's UPI ID via reverse penny-drop
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Razorpay order for UPI verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpiVerificationOrder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /professionals/me/upi-verification/confirm:
    post:
      operationId: confirmUpiVerification
      tags: [professionals]
      summary: Confirm the ₹1 UPI verification payment, save the server-verified VPA, and auto-refund
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmUpiVerificationBody"
      responses:
        "200":
          description: UPI verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpiVerificationResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /professionals/{id}:
    get:
      operationId: getProfessional
      tags: [professionals]
      summary: Get professional by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Professional profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /professionals/search:
    get:
      operationId: searchProfessionals
      tags: [search]
      summary: Search professionals by specialty and location
      parameters:
        - name: specialty
          in: query
          required: false
          schema:
            type: string
            enum:
              - shadow_teacher
              - special_tutor
              - occupational_therapy
              - speech_therapy
              - psychiatrist
              - developmental_pediatrician
              - neurologist
              - therapy_centre
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: minExperience
          in: query
          required: false
          schema:
            type: integer
        - name: minRating
          in: query
          required: false
          schema:
            type: number
        - name: willingToTravel
          in: query
          required: false
          schema:
            type: boolean
        - name: lat
          in: query
          required: false
          schema:
            type: number
          description: Latitude for geo-radius search
        - name: lng
          in: query
          required: false
          schema:
            type: number
          description: Longitude for geo-radius search
        - name: radiusKm
          in: query
          required: false
          schema:
            type: number
          description: Search radius in km (used with lat/lng)
        - name: budgetMaxINR
          in: query
          required: false
          schema:
            type: integer
          description: Filter by maximum session price in INR
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of professionals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchProfessionalsResponse"

  /ratings:
    post:
      operationId: createRating
      tags: [ratings]
      summary: Submit or update a rating for a professional (upsert — one per parent per professional)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRatingBody"
      responses:
        "201":
          description: Rating created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ratings/professional/{id}:
    get:
      operationId: getRatingsForProfessional
      tags: [ratings]
      summary: Get all ratings for a professional (includes anonymized reviewer name)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"

  /ratings/my/{professionalId}:
    get:
      operationId: getMyRatingForProfessional
      tags: [ratings]
      summary: Get the authenticated parent's rating for a specific professional
      security:
        - clerkAuth: []
      parameters:
        - name: professionalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Parent's rating or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyRatingResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts/usage:
    get:
      operationId: getContactUsage
      tags: [unlocks]
      summary: Get the authenticated parent's contact unlock usage for the current calendar month
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Contact usage for this month
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactUsage"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/me:
    get:
      operationId: getMySettings
      tags: [dashboard]
      summary: Get the public-facing subset of admin settings relevant to the current flows (any authenticated role)
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Public settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MySettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [dashboard]
      summary: Admin — get global settings
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Admin settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminSettings
      tags: [dashboard]
      summary: Admin — update global settings
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminSettingsBody"
      responses:
        "200":
          description: Updated admin settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /unlocks/check/{professionalId}:
    get:
      operationId: checkUnlockStatus
      tags: [unlocks]
      summary: Check if parent has unlocked a professional's contact
      security:
        - clerkAuth: []
      parameters:
        - name: professionalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unlock status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlockStatus"

  /unlocks:
    get:
      operationId: getMyUnlocks
      tags: [unlocks]
      summary: Get all contact unlocks for current parent
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of unlocked professional contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactUnlock"

  /dashboard/parent:
    get:
      operationId: getParentDashboard
      tags: [dashboard]
      summary: Get parent dashboard summary
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Parent dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentDashboard"

  /dashboard/professional:
    get:
      operationId: getProfessionalDashboard
      tags: [dashboard]
      summary: Get professional dashboard summary
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Professional dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalDashboard"

  /dashboard/stats:
    get:
      operationId: getPlatformStats
      tags: [dashboard]
      summary: Get platform-wide statistics (public)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /admin/professionals/billing:
    get:
      operationId: getAdminProfessionalsBilling
      tags: [dashboard]
      summary: Admin — list professionals with their payment/subscription status
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of professionals with billing info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfessionalsBillingResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/plans:
    get:
      operationId: getPaymentPlans
      tags: [payments]
      summary: Get available payment plans and prices
      responses:
        "200":
          description: Payment plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentPlans"

  /payments/subscription:
    get:
      operationId: getMySubscription
      tags: [payments]
      summary: Get current user's active subscription
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Active subscription or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/history:
    get:
      operationId: getPaymentHistory
      tags: [payments]
      summary: Get user's payment history
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Payment history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentRecord"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/stripe/checkout:
    post:
      operationId: createStripeCheckout
      tags: [payments]
      summary: Create a Stripe Checkout session
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStripeCheckoutBody"
      responses:
        "200":
          description: Stripe checkout session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeCheckoutSession"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/razorpay/order:
    post:
      operationId: createRazorpayOrder
      tags: [payments]
      summary: Create a Razorpay order
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRazorpayOrderBody"
      responses:
        "200":
          description: Razorpay order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RazorpayOrder"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/razorpay/verify:
    post:
      operationId: verifyRazorpayPayment
      tags: [payments]
      summary: Verify Razorpay payment signature and activate unlock
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRazorpayBody"
      responses:
        "200":
          description: Payment verified and activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerifyResult"
        "400":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/session-credits:
    get:
      operationId: getSessionCredits
      tags: [payments]
      summary: Get the authenticated parent's current session credit balance
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current session credit balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionCredits"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/stripe:
    post:
      operationId: stripeWebhook
      tags: [webhooks]
      summary: Stripe webhook handler
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /webhooks/razorpay:
    post:
      operationId: razorpayWebhook
      tags: [webhooks]
      summary: Razorpay webhook handler (payment.captured)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /compliance/privacy:
    get:
      operationId: getPrivacyPolicy
      tags: [compliance]
      summary: Get privacy policy content
      responses:
        "200":
          description: Privacy policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceContent"

  /compliance/terms:
    get:
      operationId: getTermsOfService
      tags: [compliance]
      summary: Get terms of service content
      responses:
        "200":
          description: Terms of service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceContent"

  /compliance/support:
    get:
      operationId: getSupportInfo
      tags: [compliance]
      summary: Get support information
      responses:
        "200":
          description: Support info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceContent"

  /admin/professionals:
    get:
      operationId: adminListProfessionals
      tags: [admin]
      summary: List all professionals with status (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [unsubmitted, pending, verified, rejected]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of professionals with user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfessionalsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/vapid-public-key:
    get:
      operationId: getVapidPublicKey
      tags: [notifications]
      summary: Get VAPID public key for Web Push subscription
      responses:
        "200":
          description: VAPID public key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapidPublicKeyResponse"
        "503":
          description: Push notifications not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/professionals/{id}/approve:
    patch:
      operationId: adminApproveProfessional
      tags: [admin]
      summary: Approve a professional's onboarding (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated professional profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalProfile"
        "400":
          description: >-
            Vertical's mandatory verification requirements are not met
            (missing government ID and/or, for therapists, RCI CRR number
            and RCI certificate). Approval is hard-blocked server-side.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationRequirementsErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/professionals/{id}/reject:
    patch:
      operationId: adminRejectProfessional
      tags: [admin]
      summary: Reject a professional's onboarding (admin only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated professional profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get admin platform statistics (admin only)
      security:
        - clerkAuth: []
