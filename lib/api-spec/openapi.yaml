                $ref: "#/components/schemas/ErrorResponse"

  /account/delete:
    post:
      tags: [account]
      operationId: deleteMyAccount
      summary: Delete account and all personal data (GDPR/DPDP right to erasure)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountBody"
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Confirmation phrase missing or wrong
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/availability:
    get:
      operationId: getMyAvailability
      tags: [sessions]
      summary: Get own availability slots
      description: Professional retrieves their own weekly availability schedule
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Availability slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"
        "401":
          description: Unauthorized
    put:
      operationId: setAvailability
      tags: [sessions]
      summary: Set weekly availability
      description: Professional replaces their entire availability schedule
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAvailabilityBody"
      responses:
        "200":
          description: Availability updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"

  /professionals/{id}/availability:
    get:
      operationId: getProfessionalAvailability
      tags: [sessions]
      summary: Get a professional's public availability config
      description: Returns the weekly availability schedule for a professional (public)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Availability slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"

  /professionals/{id}/bookable-slots:
    get:
      operationId: getBookableSlots
      tags: [sessions]
      summary: Get bookable time slots for a date
      description: Returns computed available time slots for a professional on a given date, excluding already-booked slots
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Bookable slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookableSlot"

  /sessions/book:
    post:
      operationId: bookSession
      tags: [sessions]
      summary: Book a session and create payment order
      description: Parent books a time slot with a professional and receives a Razorpay order to complete payment
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookSessionBody"
      responses:
        "200":
          description: Session created with Razorpay order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionBookingOrderResponse"
        "400":
          description: Slot already taken or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/verify-payment:
    post:
      operationId: verifySessionPayment
      tags: [sessions]
      summary: Verify Razorpay payment and confirm session
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifySessionPaymentBody"
      responses:
        "200":
          description: Session confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionBooking"

  /sessions:
    get:
      operationId: getMySessions
      tags: [sessions]
      summary: List sessions for current user
      description: Returns upcoming and past sessions. Role-aware — professionals see sessions booked with them, parents see sessions they booked.
      security:
        - clerkAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionBookingWithDetails"

  /sessions/{id}/status:
    patch:
      operationId: updateSessionStatus
      tags: [sessions]
      summary: Update session status
      description: Professional can mark a session as completed, no_show, or cancelled
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionStatusBody"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionBooking"
        "403":
          description: Not authorized to update this session

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    VerificationRequirementsErrorResponse:
      type: object
      properties:
        error:
          type: string
          enum: [verification_requirements_not_met]
        message:
          type: string
        missing:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
      required:
        - error
        - message
        - missing
        - warnings

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        fullName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [parent, professional, admin]
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
          description: Parent's home latitude — stored only with consent for home-visit matching
        longitude:
          type: ["number", "null"]
          description: Parent's home longitude — stored only with consent for home-visit matching
        shareHomeLocation:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkId
        - role
        - createdAt

    UpdateUserBody:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        city:
          type: string
        country:
          type: string
        location:
          type: string
        latitude:
          type: number
          description: Parent's home latitude — stored for home-visit matching
        longitude:
          type: number
          description: Parent's home longitude — stored for home-visit matching
        shareHomeLocation:
          type: boolean
        avatarUrl:
          type: string

    SetRoleBody:
      type: object
      properties:
        role:
          type: string
          enum:
            - parent
            - professional
      required:
        - role

    ProfessionalProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        fullName:
          type: ["string", "null"]
        specialty:
          type: string
          enum:
            - shadow_teacher
            - special_tutor
            - occupational_therapy
            - speech_therapy
            - psychiatrist
            - developmental_pediatrician
            - neurologist
            - therapy_centre
        bio:
          type: ["string", "null"]
        yearsExperience:
          type: integer
        qualifications:
          type: string
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        displayArea:
          type: ["string", "null"]
          description: Human-readable neighbourhood/area label shown to parents
        clinicAddress:
          type: ["string", "null"]
          description: Full clinic/practice address — revealed to parents only after a booking is confirmed
        offersHomeVisits:
          type: boolean
          description: Whether this specialist offers home-visit sessions
        travelRadiusKm:
          type: integer
        willingToTravel:
          type: boolean
        isVerified:
          type: boolean
        verificationStatus:
          type: string
          enum: [pending, verified, rejected, unsubmitted]
        averageRating:
          type: ["number", "null"]
        totalRatings:
          type: integer
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        pricingMinINR:
          type: ["integer", "null"]
        pricingMaxINR:
          type: ["integer", "null"]
        vertical:
          type: string
          enum: [shadow_teacher, home_tutor, therapist]
        verticalDetails:
          nullable: true
          description: Vertical-specific structured details (e.g. therapist licensing info)
        rciCrrNumber:
          type: ["string", "null"]
          description: RCI Central Rehabilitation Register number — required for therapists to be searchable
        rciVerified:
          type: boolean
        rejectionReason:
          type: ["string", "null"]
          description: Reason given by admin when the application was rejected
        upiId:
          type: ["string", "null"]
          description: UPI ID — returned only in private (own profile) response
        upiVpa:
          type: ["string", "null"]
          description: Server-verified UPI VPA (via ₹1 reverse penny-drop) — read-only, returned only in private (own profile) response
        upiVerifiedAt:
          type: ["string", "null"]
          format: date-time
          description: When the UPI VPA was last verified — null if never verified
        paymentActivated:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - specialty
        - yearsExperience
        - qualifications
        - offersHomeVisits
        - travelRadiusKm
        - willingToTravel
        - isVerified
        - verificationStatus
        - totalRatings
        - paymentActivated
        - createdAt

