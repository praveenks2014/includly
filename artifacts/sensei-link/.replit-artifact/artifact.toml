kind = "web"
previewPath = "/"
title = "Sproutly"
version = "1.0.0"
id = "artifacts/sensei-link"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23642

[services.development]
run = "pnpm --filter @workspace/sensei-link run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sensei-link", "run", "build" ]
publicDir = "artifacts/sensei-link/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23642"
BASE_PATH = "/"
